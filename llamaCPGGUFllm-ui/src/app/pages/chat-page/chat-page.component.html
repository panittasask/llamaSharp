<section class="chat-page">
  <aside class="chat-sidebar">
    <div class="sidebar-top">
      <h1>Chats</h1>
      <button type="button" class="new-chat" (click)="createNewChat()">
        + New
      </button>
    </div>

    <a class="settings-link" routerLink="/settings">Settings</a>

    <section class="sidebar-card sessions-card">
      <div class="sidebar-card-head">
        <span>Sessions</span>
        <strong>{{ sessions.length }}</strong>
      </div>
      <button
        type="button"
        class="session-item"
        *ngFor="let session of sessions"
        [class.active]="session.id === activeSessionId"
        (click)="switchSession(session.id)"
      >
        <span class="session-title">{{ session.title }}</span>
        <span class="session-meta">
          {{ session.updatedAtUtc | date: "shortTime" }}
        </span>
      </button>
    </section>
  </aside>

  <main class="chat-main">
    <header class="chat-header">
      <div>
        <h2>{{ sessionLabel }}</h2>
      </div>
    </header>

    <div
      #chatScrollFrame
      class="chat-log"
      [class.empty]="messages.length === 0"
    >
      <div class="empty-state" *ngIf="messages.length === 0">
        <h3>Start a conversation</h3>
        <p>
          Ask something, continue later, or create a new session from the
          sidebar.
        </p>
      </div>

      <article
        class="bubble"
        *ngFor="let message of messages"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
      >
        <div class="bubble-role">
          {{ message.role === "user" ? "You" : "Assistant" }}
        </div>
        <p>{{ message.content }}</p>
      </article>
    </div>

    <footer class="composer-shell">
      <div class="composer-top" *ngIf="isAgentMode">
        <label for="agentFilePath">Target file path</label>
        <input
          id="agentFilePath"
          type="text"
          [(ngModel)]="agentFilePath"
          placeholder="src/features/order/README.md"
        />
      </div>

      <div class="search-bar" *ngIf="showSearch && !isAgentMode">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keydown.enter)="searchAndInjectContext()"
          placeholder="Search DuckDuckGo and inject results..."
        />
        <button
          type="button"
          class="search-go"
          (click)="searchAndInjectContext()"
          [disabled]="searchBusy || !searchQuery.trim()"
        >
          {{ searchBusy ? '...' : 'Search' }}
        </button>
      </div>

      <textarea
        [(ngModel)]="prompt"
        (keydown)="onComposerKeyDown($event)"
        rows="3"
        [placeholder]="
          isAgentMode
            ? 'Describe what to create or change...'
            : 'Message Llama Assistant...'
        "
      ></textarea>

      <div class="composer-actions">
        <p class="timing" *ngIf="lastNormalTiming">
          Last response: {{ lastNormalTiming }}
        </p>
        <div class="actions-right">
          <div class="mode-toggle" aria-label="Composer mode toggle">
            <button
              type="button"
              class="mode-btn"
              [class.active]="!isAgentMode"
              (click)="setComposerMode('chat')"
            >
              Chat
            </button>
            <button
              type="button"
              class="mode-btn"
              [class.active]="isAgentMode"
              (click)="setComposerMode('agent')"
            >
              Agent
            </button>
          </div>

          <div class="buttons">
            <button
              type="button"
              class="search-toggle"
              (click)="toggleSearch()"
              [class.active]="showSearch"
              [disabled]="isAgentMode"
              title="Web Search"
            >
              🔍
            </button>
            <button
              type="button"
              class="secondary"
              (click)="sendNormal()"
              [disabled]="
                normalBusy || streamBusy || !prompt.trim() || isAgentMode
              "
            >
              {{ normalBusy ? "Testing..." : "Run Full Response (Test)" }}
            </button>
            <button
              type="button"
              class="primary"
              (click)="submitComposer()"
              [disabled]="
                streamBusy ||
                normalBusy ||
                !prompt.trim() ||
                (isAgentMode && !agentFilePath.trim())
              "
            >
              {{
                isAgentMode
                  ? agentBusy
                    ? "Running Agent..."
                    : "Run Agent"
                  : streamBusy
                    ? "Streaming..."
                    : "Send"
              }}
            </button>
          </div>
        </div>
      </div>
    </footer>
  </main>
</section>
