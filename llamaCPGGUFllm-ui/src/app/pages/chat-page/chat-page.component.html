<section class="chat-page">
  <main class="chat-main">
    <header class="chat-header">
      <div>
        <h2>{{ sessionLabel }}</h2>
      </div>
    </header>

    <div
      #chatScrollFrame
      class="chat-log"
      [class.empty]="messages.length === 0"
    >
      <div class="empty-state" *ngIf="messages.length === 0">
        <h3>Start a conversation</h3>
        <p>
          Ask something, continue later, or create a new session from the
          sidebar.
        </p>
      </div>

      <ng-container *ngFor="let message of messages; trackBy: trackMessage">
        <article
          class="bubble"
          *ngIf="
            message.role === 'user' ||
            !!message.content.trim() ||
            !showAssistantTyping
          "
          [class.user]="message.role === 'user'"
          [class.assistant]="message.role === 'assistant'"
        >
          <div class="bubble-role">
            {{ message.role === "user" ? "You" : "Assistant" }}
          </div>
          <p>{{ message.content }}</p>
        </article>
      </ng-container>

      <article
        class="bubble assistant typing-bubble"
        *ngIf="showAssistantTyping"
      >
        <!-- <div class="bubble-role">Assistant</div> -->
        <div
          class="typing-row"
          aria-live="polite"
          aria-label="Assistant is working"
        >
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-text">{{ assistantTypingText }}</span>
        </div>
      </article>
    </div>

    <footer class="composer-shell">
      <div class="composer-top" *ngIf="isAgentMode">
        <label for="agentFilePath">Target file path</label>
        <input
          id="agentFilePath"
          type="text"
          [(ngModel)]="agentFilePath"
          placeholder="src/features/order/README.md"
        />
      </div>

      <div class="search-bar" *ngIf="showSearch && !isAgentMode">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (keydown.enter)="searchAndInjectContext()"
          placeholder="Search DuckDuckGo and inject results..."
        />
        <button
          type="button"
          class="search-go"
          (click)="searchAndInjectContext()"
          [disabled]="searchBusy || !searchQuery.trim()"
        >
          {{ searchBusy ? "..." : "Search" }}
        </button>
      </div>

      <textarea
        [(ngModel)]="prompt"
        (keydown)="onComposerKeyDown($event)"
        rows="3"
        [placeholder]="
          isAgentMode
            ? 'Describe what to create or change...'
            : 'Message Llama Assistant...'
        "
      ></textarea>

      <div class="composer-actions">
        <p class="timing" *ngIf="lastNormalTiming">
          Last response: {{ lastNormalTiming }}
        </p>
        <div class="actions-right">
          <div class="mode-toggle" aria-label="Composer mode toggle">
            <button
              type="button"
              class="mode-btn"
              [class.active]="!isAgentMode"
              (click)="setComposerMode('chat')"
            >
              Chat
            </button>
            <button
              type="button"
              class="mode-btn"
              [class.active]="isAgentMode"
              (click)="setComposerMode('agent')"
            >
              Agent
            </button>
          </div>

          <div class="buttons">
            <label class="speed-mode" for="chatSpeedMode">Mode</label>
            <select
              id="chatSpeedMode"
              class="speed-select"
              [(ngModel)]="chatSpeedMode"
              [disabled]="isAgentMode || streamBusy || normalBusy"
            >
              <option value="thinking">Thinking</option>
              <option value="fast">Fast</option>
            </select>
            <button
              type="button"
              class="secondary"
              (click)="sendNormal()"
              [disabled]="
                normalBusy || streamBusy || !prompt.trim() || isAgentMode
              "
            >
              {{ normalBusy ? "Testing..." : "Run Full Response (Test)" }}
            </button>
            <button
              type="button"
              class="primary"
              (click)="submitComposer()"
              [disabled]="
                streamBusy ||
                normalBusy ||
                !prompt.trim() ||
                (isAgentMode && !agentFilePath.trim())
              "
            >
              {{
                isAgentMode
                  ? agentBusy
                    ? "Running Agent..."
                    : "Run Agent"
                  : streamBusy
                    ? "Streaming..."
                    : "Send"
              }}
            </button>
          </div>
        </div>
      </div>
    </footer>
  </main>
</section>
